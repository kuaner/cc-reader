name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  RELEASE_NAME: CC Reader ${{ github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: timeline-ui/package-lock.json

      - name: timeline-ui (install, test, build)
        run: |
          make web-install
          npm test --prefix timeline-ui
          make web-build

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build DMG
        run: make dmg-bundle

      - name: Generate checksum
        run: shasum -a 256 build/cc-reader.dmg > build/cc-reader.dmg.sha256

      # Use <<'EOF' so the shell does NOT treat Markdown backticks as command substitution
      # (<<EOF alone caused npm/xcodebuild logs to be injected into the release body).
      - name: Prepare release notes
        run: |
          cat > build/release-notes.md <<'EOF'
          ## Downloads

          - cc-reader.dmg
          - cc-reader.dmg.sha256

          ## Build Details

          - Version tag: ${{ github.ref_name }}
          - Platform: macOS universal (arm64 + x86_64)
          - Package: DMG
          - Web assets: make web-install → npm test (in timeline-ui) → make web-build → make dmg-bundle (single npm ci via make web-install)

          ## Verification

          Verify the downloaded DMG with:

          ```bash
          shasum -a 256 cc-reader.dmg
          ```

          The expected checksum is included in cc-reader.dmg.sha256.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          body_path: build/release-notes.md
          generate_release_notes: true
          files: |
            build/cc-reader.dmg
            build/cc-reader.dmg.sha256

      - name: Trigger duoduo-manager release workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DUODUO_MANAGER_REPO_TOKEN }}
          repository: openduo/duoduo-manager
          event-type: cc-reader-released
          client-payload: >-
            {"cc_reader_tag":"${{ github.ref_name }}","cc_reader_sha":"${{ github.sha }}"}